# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test ${{ matrix.os }} (node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        node: [24, 26]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go (BoringSSL build)
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install NASM (Windows, BoringSSL asm)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Install CMake/Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install CMake/Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install npm deps (skip native postinstall)
        run: npm ci
        env:
          RWEBTRANSPORT_SKIP_POSTINSTALL: '1'

      - name: Build native addon
        run: npm run build:rust

      - name: Build echo-server test fixture
        run: cargo build --release -p rwebtransport-echo-server

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
